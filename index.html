<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil uygulamalarda adres çubuğunu gizleme ve ölçeklemeyi sabitleme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>Maç Merkezi Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .mockup-container {
            width: 375px;
            height: 812px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 0 0 12px #1e293b, 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .mockup-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #1e293b;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 50;
        }

        /* Taraftar Görünümü İçin Tam Ekran Modu (Gerçek Sayfa) */
        .fan-mode.mockup-container {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
        }
        .fan-mode .mockup-notch {
            display: none !important;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden text-slate-800">

    <div id="admin-panel" class="w-1/3 bg-white border-r border-slate-200 flex flex-col shadow-xl z-10 transition-all duration-300">
        <div class="p-6 border-b border-slate-100 bg-slate-900 text-white">
            <h1 class="text-xl font-black tracking-tight flex items-center gap-2 mb-1">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <i class="ph-bold ph-trophy text-white text-lg"></i>
                </div>
                Yönetim Paneli
            </h1>
            <p class="text-xs text-slate-400 font-medium">Maçlarını yöneteceğiniz takımı seçin veya arayın.</p>
        </div>

        <div class="p-4 border-b border-slate-100 bg-slate-50">
            <div class="flex gap-2">
                <input type="text" id="new-team-input" placeholder="Örn: Fenerbahçe" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all font-medium">
                <button onclick="addTeam()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm transition-all shadow-sm flex items-center gap-2">
                    <i class="ph-bold ph-plus"></i> Ekle
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 px-2">Kayıtlı Takımlar</h3>
            <ul id="team-list" class="space-y-1">
                <!-- Takım listesi buraya gelecek -->
            </ul>
        </div>
    </div>

    <div id="preview-panel" class="w-2/3 bg-slate-100/50 flex flex-col items-center justify-center relative overflow-y-auto py-10 transition-all duration-300">
        
        <div id="action-buttons" class="absolute top-6 right-6 z-20 flex gap-2">
            <button onclick="refreshData()" class="bg-white border border-slate-200 shadow-sm hover:shadow-md text-slate-600 px-4 py-2.5 rounded-xl font-bold text-sm transition-all flex items-center gap-2">
                <i id="refresh-icon" class="ph-bold ph-arrows-clockwise text-emerald-500"></i>
                <span id="refresh-text">Yenile</span>
            </button>
        </div>

        <!-- Telefon Mockup -->
        <div id="mockup-container" class="mockup-container">
            <div class="mockup-notch"></div>
            
            <header class="bg-slate-900 text-white pt-10 pb-5 px-5 flex flex-col items-center justify-center relative shadow-md shrink-0">
                <h1 id="phone-title" class="text-lg font-black tracking-wide text-center truncate w-full uppercase">Dev Ataşehir</h1>
            </header>

            <nav class="flex border-b border-slate-200 bg-white shadow-sm shrink-0">
                <button id="tab-upcoming" class="flex-1 py-3.5 font-bold text-[13px] transition-colors duration-200 text-emerald-600 border-b-[3px] border-emerald-500 focus:outline-none flex items-center justify-center gap-2 bg-emerald-50/50" onclick="switchTab('upcoming')">
                    <i class="ph-fill ph-calendar-check text-lg"></i> Gelecek Maçlar
                </button>
                <button id="tab-results" class="flex-1 py-3.5 font-semibold text-[13px] transition-colors duration-200 text-slate-400 border-b-[3px] border-transparent focus:outline-none flex items-center justify-center gap-2 hover:text-slate-600" onclick="switchTab('results')">
                    <i class="ph-fill ph-list-numbers text-lg"></i> Sonuçlar
                </button>
            </nav>

            <main class="flex-1 overflow-y-auto bg-slate-50 relative" id="phone-content">
                <div class="h-full flex flex-col items-center justify-center text-slate-400">
                    <i class="ph-bold ph-spinner-gap animate-spin text-4xl text-emerald-500 mb-3"></i>
                    <p class="text-sm font-medium">Veriler Yükleniyor...</p>
                </div>
            </main>
            
            <div class="bg-slate-900 text-slate-400 text-[10px] text-center py-2 shrink-0 border-t border-slate-800">
                Maç Merkezi © 2026
            </div>
        </div>
    </div>

    <script>
        let teams = ["Dev Ataşehir"]; 
        let activeTeam = "Dev Ataşehir";
        let activeTab = 'upcoming'; 
        let matchData = []; 
        let logoData = {}; 
        let selectedLeague = 'Tümü'; 
        let teamLinks = {}; 

        const SHEET_MATCHES = 'https://docs.google.com/spreadsheets/d/1czqD3fVZD-P8zuefoikXfIisTmqSbSxN-4YXiibxkic/export?format=csv';
        const SHEET_LOGOS = 'https://docs.google.com/spreadsheets/d/1tze95HAdE5QzRbag--RnpzDQPlLBqHZlARJ8TuBp5Fw/export?format=csv';

        function escapeHtml(text) {
            if (!text) return "";
            return text.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function cleanText(text) {
            if(!text) return "";
            return text.toString().toLowerCase().trim()
                .replace(/i̇/g, 'i').replace(/ı/g, 'i')
                .replace(/ş/g, 's').replace(/ğ/g, 'g')
                .replace(/ü/g, 'u').replace(/ö/g, 'o')
                .replace(/ç/g, 'c')
                .replace(/[^a-z0-9]/g, '');
        }

        function normalizeForMatch(name) {
            if (!name) return "";
            let n = name.toString().toLowerCase()
                .replace(/i̇/g, 'i').replace(/ı/g, 'i')
                .replace(/ş/g, 's').replace(/ğ/g, 'g')
                .replace(/ü/g, 'u').replace(/ö/g, 'o')
                .replace(/ç/g, 'c')
                .replace(/[^a-z0-9\s-]/g, ' ') 
                .replace(/\s+/g, ' ')
                .trim();
            
            n = n.replace(/\b(sk|spor kulubu|kulubu|genclik|ve|dernegi|der|kulub|takimi|takim)\b/g, ' ')
                 .replace(/\s+/g, ' ')
                 .trim();
            return n;
        }

        function isTeamMatch(searchQuery, teamFromExcel, allowVariants = true) {
            if (!searchQuery || !teamFromExcel) return false;
            
            const q = normalizeForMatch(searchQuery);
            const t = normalizeForMatch(teamFromExcel);
            
            if (q === t) return true;
            
            if (allowVariants) {
                if (t.startsWith(q + ' ') || t.startsWith(q + '-')) {
                    let leftover = t.substring(q.length).replace(/^[- \s]+|[- \s]+$/g, '');
                    if (/^[a-z0-9]$/.test(leftover)) {
                        return true; 
                    }
                }
            }
            return false; 
        }

        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                if (inQuotes) {
                    if (char === '"' && csvText[i + 1] === '"') {
                        currentCell += '"'; i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        currentCell += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentCell.trim());
                        currentCell = '';
                    } else if (char === '\n' || char === '\r') {
                        if (char === '\r' && csvText[i + 1] === '\n') i++;
                        currentRow.push(currentCell.trim());
                        rows.push(currentRow);
                        currentRow = [];
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
            }
            if (currentCell !== '' || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }
            return rows;
        }

        function setLoading(isLoading) {
            const content = document.getElementById('phone-content');
            if (isLoading) {
                content.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 fade-in pb-20 pt-10">
                        <i class="ph-bold ph-spinner-gap animate-spin text-4xl text-emerald-500 mb-3"></i>
                        <p class="text-sm font-medium">Veriler Yükleniyor...</p>
                    </div>
                `;
            }
        }

        async function fetchLogos() {
            try {
                const response = await fetch(`${SHEET_LOGOS}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                rows.forEach(row => {
                    if(row.length >= 2) {
                        const teamName = row[0]; 
                        let logoUrl = row[1];
                        if (logoUrl && logoUrl.includes('drive.google.com/file/d/')) {
                            const fileIdMatch = logoUrl.match(/[-\w]{25,}/);
                            if (fileIdMatch) {
                                logoUrl = `https://drive.google.com/thumbnail?id=${fileIdMatch[0]}&sz=w200-h200`;
                            }
                        }
                        if(teamName && logoUrl) logoData[teamName] = logoUrl;
                    }
                });
            } catch (error) {
                console.error("Logo çekme hatası:", error);
            }
        }

        async function fetchMatches() {
            setLoading(true);
            try {
                const response = await fetch(`${SHEET_MATCHES}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                matchData = [];
                
                let teamsToSearch = [];
                
                if (activeTeam === "Dev Ataşehir") {
                    teamsToSearch = [
                        { name: "Dev Ataşehir", allowVariants: true },
                        { name: "Dev İstanbul", allowVariants: true },
                        { name: "Dev Spor", allowVariants: true }
                    ];
                } else {
                    teamsToSearch = [{ name: activeTeam, allowVariants: true }];
                }

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 7) continue;

                    const homeTeamRaw = row[3] || "";
                    const awayTeamRaw = row[6] || "";

                    let matchFound = false;
                    for (let target of teamsToSearch) {
                        if (isTeamMatch(target.name, homeTeamRaw, target.allowVariants) || 
                            isTeamMatch(target.name, awayTeamRaw, target.allowVariants)) {
                            matchFound = true;
                            break;
                        }
                    }

                    if (matchFound) {
                        const homeScoreRaw = row[4] || "";
                        const awayScoreRaw = row[5] || "";
                        const setResultsRaw = row[7] || "";
                        
                        const isScoreNumber = (val) => /\d/.test(val) || val.toLowerCase().includes('hkm');
                        const hasScore = isScoreNumber(homeScoreRaw) || isScoreNumber(awayScoreRaw) || isScoreNumber(setResultsRaw);

                        const status = hasScore ? 'results' : 'upcoming';

                        let timestamp = 0;
                        let dateStr = row[0] || "";
                        let timeStr = row[2] || "00:00";
                        const dateParts = dateStr.split('.');
                        if (dateParts.length === 3) {
                            timestamp = new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}T${timeStr.padStart(5, '0')}:00`).getTime();
                        }
                        if (isNaN(timestamp)) timestamp = 0;

                        let leagueParts = [row[8], row[9], row[10], row[11]].filter(p => p && p !== "-");
                        let leagueName = leagueParts.length > 0 ? leagueParts.join(" ") : "Kategori Belirtilmemiş";

                        leagueName = leagueName.replace(/^\d+\s+/g, ''); 
                        leagueName = leagueName.replace(/^[a-zA-Z]\s+/gi, ''); 
                        leagueName = leagueName.replace(/^[-_]\s*/, '').trim(); 

                        matchData.push({
                            date: dateStr,
                            location: row[1] || "Belirtilmedi",
                            time: timeStr,
                            homeTeam: homeTeamRaw,
                            awayTeam: awayTeamRaw,
                            homeScore: homeScoreRaw,
                            awayScore: awayScoreRaw,
                            setResults: setResultsRaw,
                            league: leagueName,
                            status: status,
                            timestamp: timestamp
                        });
                    }
                }
                
                renderCards();
            } catch (error) {
                console.error("Maç çekme hatası:", error);
                document.getElementById('phone-content').innerHTML = `<div class="p-5 text-center text-red-500 font-bold">Veriler alınırken hata oluştu.</div>`;
            }
        }

        function formatSetsHTML(setStr) {
            if (!setStr || setStr === '-' || setStr.trim() === '') return '';
            const regex = /(\d+)\s*[-:]\s*(\d+)/g;
            let match;
            let sets = [];
            let setIndex = 1;

            while ((match = regex.exec(setStr)) !== null) {
                let s1 = parseInt(match[1]);
                let s2 = parseInt(match[2]);
                
                let color1 = s1 > s2 ? 'text-emerald-500' : (s1 < s2 ? 'text-rose-500' : 'text-slate-600');
                let color2 = s2 > s1 ? 'text-emerald-500' : (s2 < s1 ? 'text-rose-500' : 'text-slate-600');

                sets.push(`
                    <div class="flex flex-col items-center bg-slate-50 rounded-xl py-1.5 px-1 border border-slate-100 shadow-[0_2px_4px_rgba(0,0,0,0.02)] min-w-[50px] flex-1">
                        <span class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest mb-0.5">SET ${setIndex}</span>
                        <div class="flex items-center gap-1 font-black text-[13px]">
                            <span class="${color1}">${s1}</span>
                            <span class="text-slate-300">-</span>
                            <span class="${color2}">${s2}</span>
                        </div>
                    </div>
                `);
                setIndex++;
            }
            
            if (sets.length === 0) return '';
            return `<div class="flex flex-wrap gap-1.5 justify-center mb-3 w-full">${sets.join('')}</div>`;
        }

        function renderCards() {
            const content = document.getElementById('phone-content');
            content.innerHTML = '';

            let filteredMatches = matchData.filter(m => m.status === activeTab);

            if (activeTab === 'results') {
                filteredMatches.sort((a, b) => b.timestamp - a.timestamp); 
            } else {
                filteredMatches.sort((a, b) => a.timestamp - b.timestamp); 
            }

            if (filteredMatches.length === 0) {
                let message = activeTab === 'results' ? "Skoru girilmiş maç bulunamadı." : "Gelecek maç bulunamadı.";
                content.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 fade-in pb-20 pt-10">
                        <div class="w-16 h-16 bg-slate-200/50 rounded-full flex items-center justify-center mb-4">
                            <i class="ph-bold ph-calendar-x text-3xl text-slate-400"></i>
                        </div>
                        <p class="text-[13px] font-bold text-slate-500">Kayıt Bulunamadı</p>
                        <p class="text-xs text-slate-400 mt-1 text-center px-6">${message}</p>
                    </div>
                `;
                return;
            }

            const leagues = [...new Set(filteredMatches.map(m => m.league))];
            
            let html = `
                <div class="px-4 pt-5 mb-2 fade-in relative z-20">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2 block px-1">Kategori / Lig Seçimi</label>
                    <div class="relative">
                        <select onchange="changeLeague(this.value)" class="w-full appearance-none bg-white border border-slate-200 text-[#1e1b4b] text-[13px] font-bold py-4 px-4 rounded-[16px] shadow-sm focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all cursor-pointer">
                            <option value="Tümü" ${selectedLeague === 'Tümü' ? 'selected' : ''}>🌟 Tüm Kategoriler (${filteredMatches.length} Maç)</option>
                            ${leagues.map(l => `<option value="${escapeHtml(l)}" ${selectedLeague === l ? 'selected' : ''}>🏆 ${escapeHtml(l)}</option>`).join('')}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-slate-400">
                            <i class="ph-bold ph-caret-down text-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="px-4 pb-6 mt-4 fade-in">
            `;

            let matchesToDisplay = filteredMatches;
            if (selectedLeague !== 'Tümü') {
                matchesToDisplay = filteredMatches.filter(m => m.league === selectedLeague);
            }

            matchesToDisplay.forEach(match => {
                const isFinished = activeTab === 'results';
                
                let shareText = `🏆 *${match.league}*\n\n📅 ${match.date} | ⏰ ${match.time}\n📍 ${match.location}\n\n`;
                if (isFinished) {
                    shareText += `🔴 *${match.homeTeam}* [ ${match.homeScore} - ${match.awayScore} ] *${match.awayTeam}* 🔵\n`;
                    if (match.setResults && match.setResults !== '-') shareText += `(Setler: ${match.setResults})\n`;
                } else {
                    shareText += `🔴 *${match.homeTeam}*\n      VS\n🔵 *${match.awayTeam}*\n`;
                }
                const waLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;

                html += `
                    <div class="bg-white rounded-[24px] p-4 pb-4 mb-4 shadow-sm border border-slate-100 relative fade-in">
                        
                        <div class="flex justify-between items-start mb-5 gap-2">
                            <div class="bg-[#fff7ed] text-[#ea580c] border border-[#ffedd5] text-[9px] font-extrabold px-2.5 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm uppercase tracking-wider overflow-hidden max-w-[40%]">
                                <i class="ph-fill ph-trophy shrink-0 text-[#ea580c]"></i>
                                <span class="truncate">${match.league}</span>
                            </div>
                            <div class="flex gap-1.5 overflow-hidden flex-1 justify-end">
                                <div class="bg-[#eff6ff] text-[#2563eb] border border-[#dbeafe] text-[9px] font-extrabold px-2.5 py-1.5 rounded-full flex items-center shadow-sm uppercase tracking-wider shrink-0">
                                    <span class="truncate">${match.date} | ${match.time}</span>
                                </div>
                                <div class="bg-slate-50 text-slate-600 border border-slate-100 text-[9px] font-extrabold px-2.5 py-1.5 rounded-full flex items-center gap-1 shadow-sm overflow-hidden w-max">
                                    <i class="ph-fill ph-map-pin text-slate-400 shrink-0"></i>
                                    <span class="truncate">${match.location}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center px-1 mb-3">
                            <div class="flex flex-col items-center w-[32%]">
                                <div class="w-[65px] h-[65px] bg-white rounded-full flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(0,0,0,0.06)] p-1.5 border border-slate-50">
                                    ${getTeamLogoHtml(match.homeTeam)}
                                </div>
                                <span class="text-[10px] font-black text-center text-[#0f172a] uppercase tracking-tight line-clamp-2 leading-tight">${match.homeTeam}</span>
                            </div>

                            <div class="flex flex-col items-center justify-center w-[36%] relative top-[-5px]">
                                ${isFinished ? `
                                    <div class="flex items-center justify-center gap-1.5">
                                        <div class="bg-[#1e1b4b] text-white font-black text-[24px] w-[50px] h-[58px] flex items-center justify-center rounded-[18px] shadow-lg text-center leading-none">${match.homeScore}</div>
                                        <div class="text-slate-300 font-black text-xl opacity-60">:</div>
                                        <div class="bg-[#1e1b4b] text-white font-black text-[24px] w-[50px] h-[58px] flex items-center justify-center rounded-[18px] shadow-lg text-center leading-none">${match.awayScore}</div>
                                    </div>
                                ` : `
                                    <div class="bg-[#1e1b4b] text-white font-black text-lg px-4 py-3 rounded-[18px] shadow-lg">VS</div>
                                `}
                            </div>

                            <div class="flex flex-col items-center w-[32%]">
                                <div class="w-[65px] h-[65px] bg-white rounded-full flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(0,0,0,0.06)] p-1.5 border border-slate-50">
                                    ${getTeamLogoHtml(match.awayTeam)}
                                </div>
                                <span class="text-[10px] font-black text-center text-[#0f172a] uppercase tracking-tight line-clamp-2 leading-tight">${match.awayTeam}</span>
                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-t border-slate-100">
                            ${isFinished ? formatSetsHTML(match.setResults) : ''}
                            <a href="${waLink}" target="_blank" class="w-full bg-[#ecfdf5] text-[#059669] font-extrabold text-[12px] py-4 rounded-[18px] flex justify-center items-center gap-2 hover:bg-[#d1fae5] transition-colors shadow-sm tracking-wide">
                                <i class="ph-bold ph-whatsapp text-xl"></i> WHATSAPP İLE PAYLAŞ
                            </a>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            content.innerHTML = html;
        }

        function getTeamLogoHtml(teamName) {
            if (!teamName) return `<div class="w-full h-full flex items-center justify-center bg-slate-100 rounded-full"><span class="font-black text-slate-400">?</span></div>`;
            
            let foundUrl = null;
            let s1 = normalizeForMatch(teamName).replace(/\s+/g, ''); 
            
            for (let key in logoData) {
                let k1 = normalizeForMatch(key).replace(/\s+/g, '');
                if (s1 === k1) { foundUrl = logoData[key]; break; }
            }
            
            if (!foundUrl) {
                for (let key in logoData) {
                    let k1 = normalizeForMatch(key).replace(/\s+/g, '');
                    if (k1.length > 3 && s1.startsWith(k1)) { 
                        let leftover = s1.replace(k1, '');
                        if(/^[a-z0-9]$/.test(leftover)) {
                            foundUrl = logoData[key]; break; 
                        }
                    }
                }
            }

            if (foundUrl) {
                return `<img src="${foundUrl}" alt="Logo" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div style="display:none;" class="w-full h-full items-center justify-center bg-slate-100 rounded-full">
                            <span class="font-black text-lg text-slate-600">${teamName.substring(0, 2).toUpperCase()}</span>
                        </div>`;
            }
            return `<div class="w-full h-full flex items-center justify-center bg-slate-100 rounded-full"><span class="font-black text-lg text-slate-600">${teamName.substring(0, 2).toUpperCase()}</span></div>`;
        }

        function changeLeague(leagueName) {
            selectedLeague = leagueName;
            renderCards();
        }

        function switchTab(tabName) {
            activeTab = tabName;
            selectedLeague = 'Tümü'; 
            
            const upBtn = document.getElementById('tab-upcoming');
            const resBtn = document.getElementById('tab-results');
            const activeCls = "flex-1 py-3.5 font-bold text-[13px] transition-colors duration-200 text-emerald-600 border-b-[3px] border-emerald-500 focus:outline-none flex items-center justify-center gap-2 bg-emerald-50/50";
            const passiveCls = "flex-1 py-3.5 font-semibold text-[13px] transition-colors duration-200 text-slate-400 border-b-[3px] border-transparent hover:text-slate-600 focus:outline-none flex items-center justify-center gap-2";
            
            if (tabName === 'upcoming') {
                upBtn.className = activeCls; resBtn.className = passiveCls;
            } else {
                resBtn.className = activeCls; upBtn.className = passiveCls;
            }
            renderCards();
        }

        function generateLongLink(teamName) {
            const url = new URL(window.location.href);
            url.searchParams.set('team', teamName);
            return url.href;
        }

        function saveShortLink(teamName) {
            const input = document.getElementById('short-link-input');
            if(input) {
                teamLinks[teamName] = input.value;
                const btn = input.nextElementSibling;
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="ph-bold ph-check-circle text-emerald-600"></i>';
                btn.classList.replace('bg-emerald-50', 'bg-emerald-200');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-emerald-200', 'bg-emerald-50');
                }, 1500);
            }
        }

        function copyLinkText(text, btnElement) {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const originalHtml = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="ph-bold ph-check text-emerald-500"></i>';
                setTimeout(() => { btnElement.innerHTML = originalHtml; }, 2000);
            } catch (err) {
                console.error("Kopyalama başarısız", err);
            }
            document.body.removeChild(textArea);
        }

        function openShortLink(teamName) {
            const link = teamLinks[teamName];
            if (link) {
                let url = link;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                window.open(url, '_blank');
            } else {
                alert('Lütfen önce bir kısa link kaydedin.');
            }
        }

        function renderTeamList() {
            const list = document.getElementById('team-list');
            list.innerHTML = '';
            teams.forEach(team => {
                const isActive = team === activeTeam;
                const shortLink = teamLinks[team] || '';
                const longLink = generateLongLink(team);
                
                let li = `<li class="${isActive ? 'mb-2' : 'mb-1'}">`;
                
                li += `
                    <button onclick="selectTeam('${escapeHtml(team)}')" class="w-full text-left px-4 py-3 flex items-center justify-between transition-all ${isActive ? 'bg-slate-900 text-white font-semibold shadow-md rounded-t-xl' : 'text-slate-600 hover:bg-slate-100 font-medium text-sm rounded-xl'}">
                        <span class="truncate">${team}</span>
                        ${isActive ? '<i class="ph-bold ph-caret-down text-emerald-400"></i>' : ''}
                    </button>
                `;

                if (isActive) {
                    li += `
                    <div class="bg-white border border-slate-200 border-t-0 rounded-b-xl p-3 shadow-sm animate-[fadeIn_0.2s_ease-out]">
                        <div class="mb-3">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Uzun Link (GitHub - Otomatik)</label>
                            <div class="flex gap-1.5">
                                <input type="text" readonly value="${longLink}" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs text-slate-500 focus:outline-none">
                                <button onclick="copyLinkText('${longLink}', this)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="Kopyala">
                                    <i class="ph-bold ph-copy"></i>
                                </button>
                                <a href="${longLink}" target="_blank" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="Git / Aç">
                                    <i class="ph-bold ph-arrow-square-out"></i>
                                </a>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Kısa Link (Manuel Ekle)</label>
                            <div class="flex gap-1.5">
                                <input type="text" id="short-link-input" value="${shortLink}" placeholder="Örn: bit.ly/takim" class="flex-1 bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                                <button onclick="saveShortLink('${escapeHtml(team)}')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 px-3 py-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="Kaydet">
                                    <i class="ph-bold ph-floppy-disk text-lg"></i>
                                </button>
                                <button onclick="copyLinkText(document.getElementById('short-link-input').value, this)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="Kopyala">
                                    <i class="ph-bold ph-copy"></i>
                                </button>
                                <button onclick="openShortLink('${escapeHtml(team)}')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="Git / Aç">
                                    <i class="ph-bold ph-arrow-square-out"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    `;
                }
                
                li += `</li>`;
                list.innerHTML += li;
            });
        }

        function selectTeam(teamName) {
            activeTeam = teamName;
            selectedLeague = 'Tümü';
            document.getElementById('phone-title').innerText = teamName;
            renderTeamList();
            fetchMatches(); 
        }

        function addTeam() {
            const input = document.getElementById('new-team-input');
            const newTeam = input.value.trim();
            if (newTeam && !teams.includes(newTeam)) {
                teams.push(newTeam);
                input.value = '';
                selectTeam(newTeam);
            }
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            const text = document.getElementById('refresh-text');
            icon.classList.add('animate-spin');
            text.innerText = 'Yenileniyor...';
            
            await fetchLogos();
            await fetchMatches();
            
            icon.classList.remove('animate-spin');
            text.innerText = 'Yenile';
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const teamParam = urlParams.get('team');

            if (teamParam) {
                activeTeam = teamParam;
                document.getElementById('admin-panel').style.display = 'none'; 
                document.getElementById('preview-panel').className = "w-full bg-slate-100 flex flex-col items-center justify-center relative h-screen overflow-hidden";
                document.getElementById('mockup-container').classList.add('fan-mode'); 
                document.getElementById('action-buttons').style.display = 'none'; 
                document.getElementById('phone-title').innerText = activeTeam;
                
                await fetchLogos();
                await fetchMatches();
            } else {
                renderTeamList();
                await fetchLogos();
                await fetchMatches();
            }
        };
    </script>
</body>
</html>
